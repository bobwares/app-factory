version: 1
kind: target-tech-stack-profile
profile:
  id: terraform-aws-ecs-fargate
  category: iac
  tool: terraform
  platform: aws-containers
  supports:
    backendPlatforms:
      - container
    uiPlatforms:
      - container
  artifacts:
    - main.tf
    - variables.tf
    - outputs.tf
    - modules
  capabilities:
    - vpc
    - alb
    - ecs-fargate
    - ecr
    - cloudwatch
    - rds-postgresql
  stateManagement:
    mode: remote-state
    backend: s3-and-dynamodb-lock
  secrets:
    mode: aws-secrets-manager
