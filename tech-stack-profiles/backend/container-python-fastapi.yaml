version: 1
kind: target-tech-stack-profile
profile:
  id: container-python-fastapi
  category: backend
  platform: container
  language: python
  framework: fastapi
  cloud:
    provider: aws
    services:
      - ecs-fargate
      - ecr
      - cloudwatch
      - xray
  runtime:
    name: python
    version: "3.12"
    packaging: container-image
    webServer: uvicorn
    asyncModel: request-response
  api:
    style: rest
    authModes:
      - oauth2-jwt
      - session
      - iam-via-ingress
  serviceConventions:
    dependencyInjection: fastapi-native
    validation: pydantic
    serialization: pydantic
    testing: pytest
  observability:
    structuredLogging: true
    tracing: opentelemetry
    metrics: prometheus-compatible
    correlationId: x-correlation-id
  defaults:
    persistenceProfileRef: persistence/postgresql-service
    preferredIacProfileRefs:
      - iac/terraform-aws-ecs-fargate
      - iac/docker-compose-local-dev
