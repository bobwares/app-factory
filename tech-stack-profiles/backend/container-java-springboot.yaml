version: 1
kind: target-tech-stack-profile
profile:
  id: container-java-springboot
  category: backend
  platform: container
  language: java
  framework: spring-boot
  cloud:
    provider: aws
    services:
      - ecs-fargate
      - ecr
      - cloudwatch
      - xray
  runtime:
    name: jvm
    version: "21"
    packaging: container-image
    webServer: embedded-tomcat
    asyncModel: request-response
  api:
    style: rest
    authModes:
      - oauth2-jwt
      - session
      - iam-via-ingress
  serviceConventions:
    dependencyInjection: spring
    validation: jakarta-validation
    serialization: jackson
    testing: junit
    buildTool: maven
  observability:
    structuredLogging: true
    tracing: opentelemetry
    metrics: micrometer
    correlationId: x-correlation-id
  defaults:
    persistenceProfileRef: persistence/postgresql-service
    preferredIacProfileRefs:
      - iac/terraform-aws-ecs-fargate
      - iac/docker-compose-local-dev
